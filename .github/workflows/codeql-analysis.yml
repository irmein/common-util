name: "CodeQL Analysis"

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. Set up Java Environment
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '8' # Matched to project's Java 8 version

    # 2. Initialize CodeQL
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: java-kotlin
        # Forces CodeQL to watch the build instead of guessing via 'none'
        build-mode: autobuild 

    # 3. Optional: Manual Build Step (If autobuild fails)
    # If 'autobuild' fails to detect your tool, replace 'build-mode: autobuild' with 'build-mode: manual' 
    # and uncomment your specific build command below:
    # - name: Build Project
    #   run: |
    #     ./gradlew clean build -x test
    #     # or: mvn clean package -DskipTests

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
